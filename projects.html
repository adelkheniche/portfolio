<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets - Adelk.</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="light-theme projects-page-body">
    <div class="loader-mask"></div>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">Adelk.</a>
            <nav class="nav-links">
                <a href="about.html">A propos</a>
                <a href="ai.html">AI & CODE</a>
                <a href="projects.html" class="active">Projets</a>
            </nav>
        </div>
        <div class="header-right">DESIGN NO. 45 // 2026</div>
    </header>

    <main class="page-container projects-page">
        <!-- New Hero Showcase Layout -->
        <div class="hero-showcase" id="heroShowcase">

            <!-- Left: Project Info -->
            <div class="hero-left">
                <div class="project-index-large" id="heroIndex">01</div>
                <h1 class="project-title-large" id="heroTitle">WINDROSES</h1>
                <p class="project-excerpt-large" id="heroExcerpt">Transmettre une pensée à distance par le souffle. Une interaction poétique et éphémère, sans écran ni bouton.</p>
                <div class="hero-socials">
                    <a href="https://www.linkedin.com/in/adelkheniche/" target="_blank" rel="noopener">LinkedIn</a>
                </div>
                <button class="hero-read-more" id="readMoreHero">DISCOVER PROJECT</button>
            </div>

            <!-- Center: Main Image -->
            <div class="hero-center">
                <div class="main-image-wrapper">
                    <img src="assets/windroses/windrose_hero.jpg" alt="Windroses" id="heroMainImg" />
                </div>
            </div>

            <!-- Hidden Data for JS -->
            <div id="projectData" style="display:none;">
                <div class="project-item" data-id="windroses" data-index="01" data-title="WINDROSES"
                    data-img="assets/windroses/windrose_hero.jpg"
                    data-excerpt="Transmettre une pensée à distance par le souffle. Une interaction poétique et éphémère, sans écran ni bouton.">
                </div>
                <div class="project-item" data-id="nexttram" data-index="02" data-title="NEXTTRAM"
                    data-img="assets/siel/nexttram_full.png"
                    data-excerpt="Afficheur domestique temps réel basé sur ESP32, traduisant les flux de transport en un signal physique.">
                </div>
                <div class="project-item" data-id="birdie" data-index="03" data-title="BIRDIE<br />& AIR QUALITY"
                    data-img="assets/birdie/birdie_hero.jpg"
                    data-excerpt="Système de mesure IoT pour les FabLabs, inspiré de Birdie. Signalétique physique pour la qualité de l'air.">
                </div>
                <div class="project-item" data-id="ceramics" data-index="04" data-title="IMPRESSION 3D<br />CÉRAMIQUE"
                    data-img="assets/windroses/delta-wasp-2040-clay-imprimante-3d-a-base-d-argile.jpg"
                    data-excerpt="Recherche sur l'impression 3D d'argile et validation par la fabrication d'une lampe fonctionnelle.">
                </div>
                <div class="project-item" data-id="experiments" data-index="05" data-title="EXPERIMENTATIONS"
                    data-img="assets/windroses/lamp_ceramic_light.jpg"
                    data-excerpt="Essais et recherches autour de la sérigraphie Riso, de la découpe laser et de l'impression 3D céramique.">
                </div>
            </div>

            <!-- Pagination Dots & Arrow Controls -->
            <div class="hero-dots-wrapper">
                <button class="hero-arrow prev-arrow" id="prevShowcaseBtn" aria-label="Projet précédent">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="hero-dots" id="heroDots">
                    <!-- Dots will be injected by JS -->
                </div>
                <button class="hero-arrow next-arrow" id="nextShowcaseBtn" aria-label="Projet suivant">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </div>

        <!-- Scrollable Project Deep Dive (Appears below carousel) -->
        <div class="project-details-scroll" id="projectDetails">
            <div class="details-container" id="detailsContainer">
                <!-- Content will be injected here dynamically based on the active slide -->
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
